<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإدارة | تاج الإبداع</title>
<link rel="stylesheet" href="style.css">
<style>
body{background:var(--black)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{background:var(--white);border:var(--border);box-shadow:8px 8px 0 var(--red);padding:3rem;max-width:420px;width:100%}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo div{font-size:3.5rem;font-weight:800;color:var(--red)}
.login-logo p{font-size:.85rem;color:#666;letter-spacing:3px;text-transform:uppercase;margin-top:.5rem}
.login-title{font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:.5rem;text-transform:uppercase}
.login-sub{text-align:center;color:#666;font-size:.9rem;margin-bottom:2rem}
.login-error{background:#f8d7da;border:2px solid var(--red);padding:10px;font-size:.9rem;font-weight:700;margin-bottom:1rem;display:none;text-align:center}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div>تاج</div>
      <p>TAJ AL-IBDAA</p>
    </div>
    <div class="login-title">لوحة الإدارة</div>
    <div class="login-sub">أدخل كود المسؤول للدخول</div>
    <div class="login-error" id="loginError">كود خاطئ، حاول مرة أخرى</div>
    <div class="form-group">
      <label>كود الدخول</label>
      <input type="password" class="brut-input" id="adminCode" placeholder="أدخل الكود" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="brut-btn red" style="width:100%;text-align:center;margin-top:1rem" onclick="doLogin()">دخول</button>
    <div style="text-align:center;margin-top:1.5rem"><a href="index.html" style="color:#666;font-size:.85rem">← العودة للموقع</a></div>
  </div>
</div>
<script>
const ADMIN_CODE='Taj1985';
function doLogin(){
  const code=document.getElementById('adminCode').value;
  if(code===ADMIN_CODE){
    sessionStorage.setItem('taj_admin','1');
    window.location.href='admin-dashboard.html';
  } else {
    document.getElementById('loginError').style.display='block';
    document.getElementById('adminCode').value='';
    document.getElementById('adminCode').style.boxShadow='4px 4px 0 var(--red)';
  }
}
// If already logged in
if(sessionStorage.getItem('taj_admin')==='1') window.location.href='admin-dashboard.html';
</script>
</body>
</html>
