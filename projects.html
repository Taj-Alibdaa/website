<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>الأعمال | تاج الإبداع</title>
<link rel="stylesheet" href="style.css">
<style>
.filter-chips{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.chip{padding:6px 18px;border-radius:20px;border:1.5px solid var(--gray-border);background:white;font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer;transition:var(--transition);color:var(--gray-dark)}
.chip.active,.chip:hover{background:var(--red);color:white;border-color:var(--red)}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem}
.gal-card{border-radius:8px;overflow:hidden;box-shadow:var(--shadow-sm);transition:var(--transition);background:white;border:1px solid var(--gray-border);cursor:pointer}
.gal-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-md)}
.gal-img{width:100%;height:220px;object-fit:cover;background:var(--gray-light);display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--red)}
.gal-img img{width:100%;height:100%;object-fit:cover;display:block}
.gal-info{padding:1.1rem}
.gal-cat{font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:4px}
.gal-name{font-size:.98rem;font-weight:700;color:var(--black)}
.gal-loc{font-size:.8rem;color:var(--gray-mid);margin-top:3px;display:flex;align-items:center;gap:8px}
.lb-thumb{width:64px;height:52px;object-fit:cover;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:var(--transition)}
.lb-thumb:hover,.lb-thumb.active-t{border-color:var(--red)}
.lb-main{width:100%;height:340px;object-fit:contain;background:var(--gray-light);border-radius:6px;display:block;margin-bottom:.6rem}
@media(max-width:900px){.gallery{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.gallery{grid-template-columns:1fr}}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app = initializeApp({apiKey:"AIzaSyAaqn0emE1XRE1r95jzz6zOyHJpYhG6PDE",authDomain:"taj-alibdaa.firebaseapp.com",projectId:"taj-alibdaa",storageBucket:"taj-alibdaa.firebasestorage.app",messagingSenderId:"822530121102",appId:"1:822530121102:web:4f105f37c9b7a31e9298df"});
const db = getFirestore(app);
let lang = localStorage.getItem('taj_lang')||'ar';

function applyLang(){
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.getElementById('langBtn').textContent=lang==='ar'?'EN':'ع';
  document.querySelectorAll('[data-ar]').forEach(el=>{ el.innerHTML=lang==='ar'?el.dataset.ar:el.dataset.en; });
}
window.toggleLang=()=>{ lang=lang==='ar'?'en':'ar'; localStorage.setItem('taj_lang',lang); applyLang(); };
window.toggleMenu=()=>document.getElementById('navLinks').classList.toggle('open');
window.filterCat=(cat)=>{
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.cat===cat));
  document.querySelectorAll('.gal-card').forEach(c=>{ c.style.display=(cat==='all'||c.dataset.cat===cat)?'':'none'; });
};
window.closeLB=()=>document.getElementById('lightbox').classList.remove('active');
window.setMain=(url,el)=>{
  document.getElementById('lbMain').src=url;
  document.querySelectorAll('.lb-thumb').forEach(t=>t.classList.remove('active-t'));
  el.classList.add('active-t');
};
window.openLB=(p)=>{
  document.getElementById('lbCat').textContent=p.category||'';
  document.getElementById('lbName').textContent=p.name||'';
  document.getElementById('lbDesc').textContent=p.description||'';
  const imgs=p.images&&p.images.length?p.images:(p.coverUrl?[p.coverUrl]:[]);
  document.getElementById('lbMain').src=p.coverUrl||imgs[0]||'';
  document.getElementById('lbThumbs').innerHTML=imgs.map((url,i)=>
    `<img class="lb-thumb${i===0?' active-t':''}" src="${url}" onclick="setMain('${url}',this)">`
  ).join('');
  document.getElementById('lightbox').classList.add('active');
};

try{
  const [ps,cs]=await Promise.all([getDocs(collection(db,'projects')),getDocs(collection(db,'categories'))]);
  const projects=ps.docs.map(d=>({id:d.id,...d.data()}));
  const cats=cs.docs.map(d=>d.data().name).filter(Boolean);
  const fc=document.getElementById('filterChips');
  fc.innerHTML=`<button class="chip active" data-cat="all" onclick="filterCat('all')">${lang==='ar'?'الكل':'All'}</button>`;
  cats.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip'; b.dataset.cat=cat; b.textContent=cat; b.onclick=()=>filterCat(cat);
    fc.appendChild(b);
  });
  const grid=document.getElementById('galleryGrid');
  if(!projects.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-mid)">${lang==='ar'?'لا توجد مشاريع بعد':'No projects yet'}</div>`;
  } else {
    grid.innerHTML='';
    projects.forEach(p=>{
      const cover=p.coverUrl||p.imageUrl||(p.images&&p.images[0])||'';
      const cnt=(p.images||[]).length;
      const div=document.createElement('div');
      div.className='gal-card'; div.dataset.cat=p.category||'';
      div.innerHTML=`
        <div class="gal-img">${cover?`<img src="${cover}" alt="${p.name||''}" loading="lazy">`:'🏗'}</div>
        <div class="gal-info">
          <div class="gal-cat">${p.category||''}</div>
          <div class="gal-name">${p.name||''}</div>
          <div class="gal-loc">
            ${p.location?'📍 '+p.location:''}
            ${cnt>1?`<span style="font-size:.72rem;color:var(--red);font-weight:700">${cnt} صور</span>`:''}
          </div>
        </div>`;
      div.onclick=()=>openLB(p);
      grid.appendChild(div);
    });
  }
}catch(e){ console.error(e); }
applyLang();
const obs=new IntersectionObserver(entries=>entries.forEach(x=>{if(x.isIntersecting)x.target.style.animationPlayState='running'}),{threshold:.1});
document.querySelectorAll('.anim-up').forEach(el=>{ el.style.animationPlayState='paused'; obs.observe(el); });
</script>
